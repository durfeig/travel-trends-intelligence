name: Collect Travel Trends

on:
  schedule:
    # Corre 2 veces al día: 6am y 6pm UTC
    - cron: '0 6,18 * * *'
  # Disparo desde el botón del dashboard (vía API de GitHub)
  repository_dispatch:
    types: [manual_collect]
  # Permite disparo manual desde GitHub Actions UI
  workflow_dispatch:
    inputs:
      mode:
        description: 'Collection mode'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - trending
          - rising
          - monitored

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: collector/requirements.txt

      - name: Install dependencies
        run: pip install -r collector/requirements.txt

      - name: Run trend collector
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd collector
          python collect_trends.py --mode ${{ github.event.inputs.mode || github.event.client_payload.mode || 'all' }}

      - name: Run analyzer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd collector
          python analyzer.py

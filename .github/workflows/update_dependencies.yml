name: Update Python Dependencies

on:
  schedule:
    # Primer día de cada mes a las 8am UTC
    - cron: '0 8 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade dependencies
        run: |
          pip install -r collector/requirements.txt
          pip install --upgrade pytrends supabase pandas
          pip freeze | grep -E "^(pytrends|supabase|pandas)==" > collector/requirements.txt

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet collector/requirements.txt || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated requirements
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add collector/requirements.txt
          git commit -m "chore: actualizar dependencias Python $(date +'%Y-%m')"
          git push
